name: Auto Unsigned Build

on:
  push:
    branches:
      - main
      - master
      - improve-speed-overlay
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: set-short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Unsigned APKs with Gradle
        run: ./gradlew assembleStandardRelease --warning-mode all

      - name: Upload arm64-v8a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpvEx-arm64-v8a-unsigned-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/app-standard-arm64-v8a-release-unsigned.apk

      - name: Upload armeabi-v7a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpvEx-armeabi-v7a-unsigned-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/app-standard-armeabi-v7a-release-unsigned.apk

      - name: Upload universal Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpvEx-universal-unsigned-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/standard/release/app-standard-universal-release-unsigned.apk
